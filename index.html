<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>API Status Monitor</title>
    <style>
      :root {
        --bg: #0b1020;
        --card: #121a2f;
        --text: #e7ecff;
        --muted: #9aa7d1;
        --ok: #2ac769;
        --warn: #ffb020;
        --down: #ff5c5c;
        --line: #263354;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: linear-gradient(180deg, #080d1a 0%, var(--bg) 100%);
        color: var(--text);
      }
      .container {
        max-width: 980px;
        margin: 0 auto;
        padding: 28px 16px 48px;
      }
      h1,
      h2,
      h3 {
        margin: 0;
      }
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        margin-bottom: 18px;
      }
      .muted {
        color: var(--muted);
      }
      .banner {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 14px 16px;
        margin-bottom: 20px;
        font-weight: 600;
      }
      .banner.operational {
        background: rgba(42, 199, 105, 0.12);
        border-color: rgba(42, 199, 105, 0.45);
      }
      .banner.degraded_performance {
        background: rgba(255, 176, 32, 0.12);
        border-color: rgba(255, 176, 32, 0.45);
      }
      .banner.partial_outage {
        background: rgba(255, 92, 92, 0.12);
        border-color: rgba(255, 92, 92, 0.45);
      }
      .section {
        margin-top: 24px;
      }
      .cards {
        display: grid;
        gap: 12px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 14px 16px;
      }
      .api-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
      }
      .status-pill {
        border-radius: 999px;
        padding: 4px 10px;
        font-size: 12px;
        font-weight: 700;
      }
      .status-up {
        background: rgba(42, 199, 105, 0.16);
        color: #8bf0b3;
      }
      .status-degraded {
        background: rgba(255, 176, 32, 0.16);
        color: #ffd18a;
      }
      .status-down {
        background: rgba(255, 92, 92, 0.16);
        color: #ff9e9e;
      }
      .meta {
        font-size: 13px;
        margin-top: 8px;
        color: var(--muted);
      }
      .uptime-label {
        display: flex;
        justify-content: space-between;
        font-size: 11px;
        color: var(--muted);
        margin-top: 10px;
        margin-bottom: 4px;
      }
      .uptime-grid {
        display: grid;
        grid-template-columns: repeat(48, 1fr);
        gap: 2px;
      }
      .dot {
        width: 100%;
        aspect-ratio: 1;
        border-radius: 2px;
        background: #1e2a47;
      }
      .dot.up {
        background: var(--ok);
      }
      .dot.degraded {
        background: var(--warn);
      }
      .dot.down {
        background: var(--down);
      }
      .incident {
        display: grid;
        gap: 4px;
        padding: 12px 0;
        border-bottom: 1px solid var(--line);
      }
      .incident:last-child {
        border-bottom: 0;
      }
      .empty {
        color: var(--muted);
        padding: 12px 0;
      }
      .footer {
        margin-top: 28px;
        font-size: 12px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main class="container">
      <div class="header">
        <div>
          <h1>API Status Monitor</h1>
          <div class="muted">面向第三方 API 的自动可用性监测</div>
        </div>
        <div id="lastUpdated" class="muted"></div>
      </div>

      <div id="overallBanner" class="banner">加载中...</div>

      <section class="section">
        <h2>服务状态</h2>
        <div id="apiCards" class="cards"></div>
      </section>

      <section class="section">
        <h2>最近事件</h2>
        <div id="incidents"></div>
      </section>

      <div class="footer">数据来源：GitHub Actions 定时检测结果</div>
    </main>

    <script>
      const STATUS_TEXT = {
        operational: "All Systems Operational",
        degraded_performance: "Degraded Performance",
        partial_outage: "Partial Outage",
        unknown: "Unknown",
      };

      function fmtTime(iso) {
        if (!iso) return "-";
        return new Date(iso).toLocaleString("zh-CN", { hour12: false });
      }

      function shortStatus(status) {
        if (status === "up") return "Operational";
        if (status === "degraded") return "Degraded";
        return "Outage";
      }

      function statusClass(status) {
        if (status === "up") return "status-up";
        if (status === "degraded") return "status-degraded";
        return "status-down";
      }

      function hourKey(iso) {
        const d = new Date(iso);
        return `${d.getUTCFullYear()}-${String(d.getUTCMonth() + 1).padStart(2, "0")}-${String(d.getUTCDate()).padStart(2, "0")}T${String(d.getUTCHours()).padStart(2, "0")}`;
      }

      function buildLast48HourKeys() {
        const arr = [];
        const now = new Date();
        now.setUTCMinutes(0, 0, 0);
        for (let i = 47; i >= 0; i--) {
          const d = new Date(now.getTime() - i * 3600000);
          arr.push(hourKey(d.toISOString()));
        }
        return arr;
      }

      function summarizeHourStatus(state) {
        if (!state) return "nodata";
        return state;
      }

      function fmtHourLabel(hKey) {
        const [date, hour] = hKey.split("T");
        return `${date} ${hour}:00 UTC`;
      }

      async function loadData() {
        const noCache = `?t=${Date.now()}`;
        const [statusRes, historyRes] = await Promise.all([
          fetch(`./data/status.json${noCache}`),
          fetch(`./data/history.json${noCache}`),
        ]);
        if (!statusRes.ok) throw new Error("无法加载 status.json");
        if (!historyRes.ok) throw new Error("无法加载 history.json");
        return {
          status: await statusRes.json(),
          history: await historyRes.json(),
        };
      }

      function renderBanner(status) {
        const el = document.getElementById("overallBanner");
        const key = status.overall_status || "unknown";
        el.className = `banner ${key}`;
        el.textContent = STATUS_TEXT[key] || STATUS_TEXT.unknown;
      }

      function renderCards(status, history) {
        const cardsEl = document.getElementById("apiCards");
        cardsEl.innerHTML = "";

        const checks = Array.isArray(history.checks) ? history.checks : [];
        const hourKeys = buildLast48HourKeys();

        for (const api of status.apis || []) {
          const card = document.createElement("article");
          card.className = "card";

          const top = document.createElement("div");
          top.className = "api-top";
          top.innerHTML = `
            <div>
              <h3>${api.name}</h3>
              <div class="meta">${api.model} · ${api.base_url}</div>
            </div>
            <span class="status-pill ${statusClass(api.status)}">${shortStatus(api.status)}</span>
          `;
          card.appendChild(top);

          const meta = document.createElement("div");
          meta.className = "meta";
          meta.textContent = `响应时间: ${api.response_time_ms ?? "-"} ms · 最后检查: ${fmtTime(api.last_checked)}${api.error ? ` · 错误: ${api.error}` : ""}`;
          card.appendChild(meta);

          const label = document.createElement("div");
          label.className = "uptime-label";
          label.innerHTML = `<span>48 小时前</span><span>现在</span>`;
          card.appendChild(label);

          const byHour = new Map(hourKeys.map((k) => [k, null]));
          for (const check of checks) {
            const key = hourKey(check.timestamp);
            if (!byHour.has(key)) continue;
            const r = (check.results || []).find((x) => x.name === api.name);
            if (r) byHour.set(key, r.status);
          }

          const grid = document.createElement("div");
          grid.className = "uptime-grid";
          for (const k of hourKeys) {
            const st = summarizeHourStatus(byHour.get(k));
            const dot = document.createElement("div");
            dot.className = `dot${st !== "nodata" ? ` ${st}` : ""}`;
            dot.title = `${fmtHourLabel(k)}: ${st === "nodata" ? "无数据" : st}`;
            grid.appendChild(dot);
          }
          card.appendChild(grid);

          cardsEl.appendChild(card);
        }

        if (!status.apis || status.apis.length === 0) {
          cardsEl.innerHTML = '<div class="empty">暂无服务数据，请先运行一次检测。</div>';
        }
      }

      function renderIncidents(history) {
        const el = document.getElementById("incidents");
        el.innerHTML = "";
        const incidents = Array.isArray(history.incidents) ? history.incidents : [];
        if (incidents.length === 0) {
          el.innerHTML = '<div class="empty">最近无事件。</div>';
          return;
        }
        for (const item of incidents.slice(0, 20)) {
          const row = document.createElement("div");
          row.className = "incident";
          const title = item.status === "open" ? "Investigating" : "Resolved";
          const duration =
            item.duration_minutes != null ? ` · 持续 ${item.duration_minutes} 分钟` : "";
          row.innerHTML = `
            <div><strong>${title}</strong> - ${item.api_name}</div>
            <div class="muted">开始: ${fmtTime(item.start_time)}${item.end_time ? ` · 结束: ${fmtTime(item.end_time)}` : ""}${duration}</div>
            <div class="muted">${item.last_error || "状态已恢复"}</div>
          `;
          el.appendChild(row);
        }
      }

      async function init() {
        try {
          const { status, history } = await loadData();
          renderBanner(status);
          renderCards(status, history);
          renderIncidents(history);
          document.getElementById("lastUpdated").textContent =
            `最后更新: ${fmtTime(status.generated_at)}`;
        } catch (err) {
          const banner = document.getElementById("overallBanner");
          banner.className = "banner partial_outage";
          banner.textContent = `页面加载失败: ${err.message}`;
        }
      }

      init();
    </script>
  </body>
</html>
